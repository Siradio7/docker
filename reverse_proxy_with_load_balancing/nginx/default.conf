upstream backend_cluster {
    server backend1:8000;
    server backend2:8000;
}

server {
    listen 80;

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-addr $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend_cluster/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-addr $remote_addr;
    }
}