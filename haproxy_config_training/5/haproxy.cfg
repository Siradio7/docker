global
    log stdout format raw local0

defaults
    mode http

    timeout connect 5s
    timeout client 15s
    timeout server 15s

frontend app_client
    bind *:80
    default_backend app_servers

backend app_servers
    balance roundrobin

    cookie SERVERID insert indirect nocache

    server api1 api1:8080 cookie a1 check
    server api2 api2:8080 cookie a2 check
    server api3 api3:8080 cookie a3 check
