global
    log stdout format raw local0
    maxconn 4096

defaults
    mode http

    timeout connect 5s
    timeout client 60s
    timeout server 60s

frontend http_front
    bind *:80
    default_backend app_servers

backend app_servers
    balance leastconn

    server api1 api1:8080 check
    server api2 api2:8080 check
    server api3 api3:8080 check