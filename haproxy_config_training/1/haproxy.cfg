global
    log stdout format raw local0
    maxconn 2048

defaults
    mode http

    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http_front
    bind *:80
    default_backend web_servers

backend web_servers
    balance roundrobin

    server web1 web1:80 check
    server web2 web2:80 check
    server web3 web3:80 check